# Configure true color
set -sg default-terminal "screen-256color"
set -ga terminal-overrides ",*:RGB"

# Change keybinds for splitting windows
# unbind %
# bind | split-window -h
#
# unbind '"'
# bind - split-window -v


# Add keybind for easily refreshing tmux configuration
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"


# Add keybinds for easily resizing tmux panes
# bind -r j resize-pane -D 5
# bind -r k resize-pane -U 5
# bind -r l resize-pane -R 5
# bind -r h resize-pane -L 5

# Move statusbar
set-option -g status-position bottom
# set -g status-style 'bg=#000000 fg=#FFFFFF'
set -g status-style bg=default,fg=black,bright
set -g status-left ""
# set -g status-bg black
# set -g status-fg white
set -g window-status-style bg=default,fg=black
set -g window-status-current-style bg=default,fg=gray,bright
# set-option -g status-left '#[fg=cyan]#S #[fg=cyan]'
# set-option -g status-left '#[fg=cyan] #[fg=cyan]'
# set-option -g status-right '#[fg=white]#(date +"%H:%M") #[fg=white]#(whoami)'
set-option -g status-right "#[fg=black,bright]#S"

set -w -g pane-border-lines single
set -g pane-border-indicators arrows
set -g pane-border-status top
set -g pane-border-format "#{pane_index}"

# Foreground color of a pane is the actual dashed line that makes up the border
# Background color is by default black
set -w -g pane-border-style fg=black,bright,bg=default
set -w -g pane-active-border-style fg=default,bg=default

# Active pane normal, other shaded out (dim out any pane that is not active)
# color240 / color235 is lighter and darker grey
# set -g window-style fg=color240,bg=color235
# set -g window-active-style fg=white,bg=black



# Add keybind for maximizing and minimizing tmux pane
# bind -r m resize-pane -Z

# increase scrollback buffer size
set -g history-limit 50000

# messages are displayed for 4 seconds
set -g display-time 4000

# refresh status-left and status-right more often
set -g status-interval 10

# Remove esc delay by tmux
set -sg escape-time 0

# focus events enabled for terminals that support them
set -g focus-events on

# Enable mouse in tmux
set -g mouse on

# Enable copy/paste
set -s set-clipboard on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# Shift arrow to switch windows
# bind -n S-Left  previous-window
# bind -n S-Right next-window
bind -n S-Left  resize-pane -L 5
bind -n S-Down  resize-pane -D 5
bind -n S-Up  resize-pane -U 5
bind -n S-Right resize-pane -R 5
# bind -r j resize-pane -D 5
# bind -r k resize-pane -U 5
# bind -r l resize-pane -R 5
# bind -r h resize-pane -L 5

# Shift Alt vim keys to switch windows
# bind -n M-H previous-window
# bind -n M-L next-window

# Configure vim movements for tmux copy mode
bind Y copy-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"
# bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel # copy text with "y", and cancel/get back to terminal right away

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

bind-key "T" run-shell "tmux neww ~/dev/personal/dev/tmux-sesh/tmux-sessionizer"

